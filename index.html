<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a472a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#9333ea" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    
    <title>MOODITA - Gestión Artística Profesional</title>
    <meta name="description" content="Plataforma profesional de gestión artística - MOODITA" />
    <meta name="author" content="MOODITA" />
    
    <!-- Google Fonts with improved loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Theme detection script to prevent flash -->
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const shouldBeDark = savedTheme === 'dark' || (savedTheme === 'auto' && prefersDark) || (!savedTheme && prefersDark);
        
        if (shouldBeDark) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <meta property="og:title" content="MOODITA - Gestión Artística Profesional" />
    <meta property="og:description" content="Plataforma profesional de gestión artística para artistas y management" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/moodita-og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="MOODITA - Gestión Artística" />
    <meta name="twitter:description" content="Plataforma profesional de gestión artística" />
    <meta name="twitter:image" content="/moodita-og.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
